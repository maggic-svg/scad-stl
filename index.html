<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSCAD4 ➔ STL Converter</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <style>
        :root { 
            --bg-main: #0f172a; 
            --bg-card: #1e293b; 
            --bg-input: #0b0f19; 
            --accent: #10b981; 
            --accent-hover: #059669; 
            --btn-download: #38bdf8;
            --btn-download-hover: #0284c7;
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --border: #334155; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background-color: var(--bg-main); color: var(--text-main); padding: 15px; display: flex; flex-direction: column; min-height: 100vh; }
        .container { max-width: 650px; width: 100%; margin: auto; background: var(--bg-card); border-radius: 16px; padding: 24px; border: 1px solid var(--border); }
        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 1.5rem; margin-bottom: 4px; }
        header p { font-size: 0.85rem; color: var(--text-muted); }
        textarea { width: 100%; height: 180px; background-color: var(--bg-input); border: 1px solid var(--border); border-radius: 10px; padding: 14px; color: #38bdf8; font-family: monospace; font-size: 0.95rem; resize: none; outline: none; margin-top: 8px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        button { flex: 1; min-width: 160px; color: #042f1a; border: none; padding: 15px; font-size: 0.95rem; font-weight: 700; border-radius: 10px; cursor: pointer; transition: background-color 0.2s; }
        #previewBtn { background-color: var(--accent); }
        #previewBtn:hover:not(:disabled) { background-color: var(--accent-hover); }
        #downloadBtn { background-color: var(--btn-download); color: #031e2e; }
        #downloadBtn:hover:not(:disabled) { background-color: var(--btn-download-hover); }
        button:disabled { background-color: var(--border) !important; color: var(--text-muted) !important; cursor: not-allowed; }
        
        #status { margin-top: 15px; padding: 12px; border-radius: 8px; font-size: 0.85rem; text-align: center; background: #0b132b; color: #5bc0be; word-break: break-all; white-space: pre-wrap; }
        .error { background: #451a1a !important; color: #fca5a5 !important; border-color: #7f1d1d !important; }
        .success { background: #064e3b !important; color: #a7f3d0 !important; border-color: #065f46 !important; }
        
        /* Area del Visualizzatore 3D */
        #viewer-container { width: 100%; height: 280px; background-color: #0b0f19; border-radius: 12px; margin-top: 15px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        #canvas3d { width: 100%; height: 100%; display: block; }
        .viewer-label { position: absolute; top: 8px; left: 8px; background: rgba(15, 23, 42, 0.7); padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; color: var(--text-muted); pointer-events: none; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>OpenSCAD3 ➔ STL Converter</h1>
        <p>Rendering 3D locale e offline</p>
    </header>

    <textarea id="scadCode">// Esempio cilindro forato
difference() {
    cylinder(h=20, r=15, center=true, $fn=50);
    cylinder(h=22, r=8, center=true, $fn=50);
}</textarea>

    <div class="btn-group">
        <button id="previewBtn" disabled>Inizializzazione...</button>
        <button id="downloadBtn" disabled>Scarica File STL</button>
    </div>
    
    <div id="status">Avvio download del motore geometrico...</div>

    <div id="viewer-container">
        <span class="viewer-label">Anteprima 3D Interattiva</span>
        <div id="canvas3d"></div>
    </div>
</div>

<script>
    window.onerror = function(message, source, lineno, colno, error) {
        const status = document.getElementById('status');
        if(status) {
            status.className = "error";
            status.innerText = "BLOCCO SCRIPT: " + message + " (Linea: " + lineno + ")";
        }
        return false;
    };
</script>

<script type="module">
    import * as OScadModule from "https://unpkg.com/openscad-wasm@0.0.4/openscad.js";

    const scadCodeElem = document.getElementById('scadCode');
    const previewBtn = document.getElementById('previewBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusElem = document.getElementById('status');
    const canvas3dContainer = document.getElementById('canvas3d');

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log("SW Error:", err));
    }

    let openScadInstance = null;
    let openScadLogs = [];
    let ultimoBlobGenerato = null;

    // VARIABILI PER IL MOTORE GRAPHICO THREE.JS
    let scene, camera, renderer, controls, currentMesh;

    // Inizializza la scena 3D vuota all'avvio della pagina
    function init3DViewer() {
        const width = canvas3dContainer.clientWidth;
        const height = canvas3dContainer.clientHeight;

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b0f19);

        camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
        camera.position.set(40, 40, 40);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(width, height);
        canvas3dContainer.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Luci nella scena per vedere le ombre del solido
        const ambientLight = new THREE.AmbientLight(0x666666);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(1, 1, 1).normalize();
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0x555555, 0.5);
        dirLight2.position.set(-1, -1, -1).normalize();
        scene.add(dirLight2);

        window.addEventListener('resize', onWindowResize);
        animate();
    }

    function onWindowResize() {
        const width = canvas3dContainer.clientWidth;
        const height = canvas3dContainer.clientHeight;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
    }

    function animate() {
        requestAnimationFrame(animate);
        if (controls) controls.update();
        if (renderer && scene && camera) renderer.render(scene, camera);
    }

    // Carica l'array binario dell'STL nel visualizzatore
    function caricaStlNelVisualizzatore(buffer) {
        if (currentMesh) scene.remove(currentMesh);

        const loader = new THREE.STLLoader();
        const geometry = loader.parse(buffer);
        
        // Materiale plastico verde semilucido tipo filamento PLA
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x10b981, 
            roughness: 0.4,
            metalness: 0.2
        });
        
        currentMesh = new THREE.Mesh(geometry, material);
        
        // Centra l'oggetto calcolato al centro del riquadro
        geometry.computeBoundingBox();
        const boundingBox = geometry.boundingBox;
        const center = new THREE.Vector3();
        boundingBox.getCenter(center);
        currentMesh.position.sub(center);

        scene.add(currentMesh);

        // Regola la telecamera in base alla grandezza del pezzo
        const size = new THREE.Vector3();
        boundingBox.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        camera.position.set(maxDim * 1.5, maxDim * 1.5, maxDim * 1.5);
        camera.lookAt(0, 0, 0);
        if (controls) controls.target.set(0,0,0);
    }

    // Generazione pulita del motore WebAssembly
    async function creareMotoreGrafico() {
        let openScadFactory = OScadModule.OpenSCAD || OScadModule.openscad || OScadModule.default;
        if (!openScadFactory) {
            const keys = Object.keys(OScadModule);
            for (let key of keys) {
                if (typeof OScadModule[key] === 'function') {
                    openScadFactory = OScadModule[key];
                    break;
                }
            }
        }
        return await openScadFactory({ 
            noInitialRun: true,
            print: (text) => { openScadLogs.push(text); },
            printErr: (text) => { openScadLogs.push(text); },
            locateFile: (path) => `https://unpkg.com/openscad-wasm@0.0.4/${path}`
        });
    }

    async function init() {
        try {
            init3DViewer();
            statusElem.innerText = "Compilazione motore grafico...";
            openScadInstance = await creareMotoreGrafico();
            
            statusElem.className = "success";
            statusElem.innerText = "Pronto! Inserisci il codice e premi Anteprima.";
            previewBtn.innerText = "Vedi Anteprima 3D";
            previewBtn.disabled = false;
        } catch (e) {
            statusElem.className = "error";
            statusElem.innerText = "ERRORE AVVIO: " + e.message;
        }
    }

    // PULSANTE 1: CALCOLO E ANTEPRIMA VISIVA
    previewBtn.addEventListener('click', async () => {
        let code = scadCodeElem.value.trim();
        if(!code) return;
        
        previewBtn.disabled = true;
        downloadBtn.disabled = true;
        statusElem.className = "";
        statusElem.innerText = "Svuotamento memoria e calcolo anteprima...";
        openScadLogs = []; 
        await new Promise(r => setTimeout(r, 50));
        
        try {
            openScadInstance = null; 
            openScadInstance = await creareMotoreGrafico();

            if (!openScadInstance || typeof openScadInstance.renderToStl !== 'function') {
                throw new Error("Il motore grafico non si è rigenerato correttamente.");
            }

            code = code.replace(/\/\/.*$/gm, '');
            const cleanCode = code.replace(/\s+/g, ' ').trim();

            const outputData = await openScadInstance.renderToStl(cleanCode);
            
            if (!outputData || outputData.length === 0) {
                throw new Error("Il modello ha restituito una geometria vuota.");
            }
            
            // Inviamo i dati grezzi estratti dal WASM direttamente a Three.js
            caricaStlNelVisualizzatore(outputData.buffer);
            
            // Conserviamo il blob in memoria pronto per essere scaricato se l'utente clicca il secondo tasto
            ultimoBlobGenerato = new Blob([outputData], { type: "application/sla" });
            
            statusElem.className = "success";
            statusElem.innerText = "Anteprima caricata! Puoi muovere l'oggetto. Ora puoi scaricare l'STL.";
            downloadBtn.disabled = false; // Sblocca il pulsante di download
        } catch (err) {
            statusElem.className = "error";
            let msgErrore = err.message || err.toString();
            if (openScadLogs.length > 0) {
                msgErrore += "\n\nDettagli compilatore:\n" + openScadLogs.slice(-3).join(" | ");
            }
            statusElem.innerText = "ERRORE GEOMETRICO:\n" + msgErrore;
        } finally {
            previewBtn.disabled = false;
        }
    });

    // PULSANTE 2: DOWNLOAD DEL FILE SALVATO IN MEMORIA
    downloadBtn.addEventListener('click', () => {
        if (!ultimoBlobGenerato) return;
        
        const url = URL.createObjectURL(ultimoBlobGenerato);
        const a = document.createElement("a");
        a.href = url;
        a.download = "modello_3d.stl";
        a.click();
        
        // Pulizia dell'URL dopo il download
        setTimeout(() => URL.revokeObjectURL(url), 100);
    });

    init();
</script>

</body>
</html>
