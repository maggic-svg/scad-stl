<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSCAD ➔ STL Converter</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <style>
        :root { 
            --bg-main: #0f172a; 
            --bg-card: #1e293b; 
            --bg-input: #0b0f19; 
            --accent: #10b981; 
            --accent-hover: #059669; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --border: #334155; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: system-ui, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        .container { 
            max-width: 650px; 
            width: 100%; 
            margin: auto; 
            background: var(--bg-card); 
            border-radius: 16px; 
            padding: 24px; 
            border: 1px solid var(--border); 
        }
        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 1.5rem; margin-bottom: 4px; }
        header p { font-size: 0.85rem; color: var(--text-muted); }
        textarea { 
            width: 100%; 
            height: 200px; 
            background-color: var(--bg-input); 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            padding: 14px; 
            color: #38bdf8; 
            font-family: monospace; 
            font-size: 0.95rem; 
            resize: none; 
            outline: none; 
            margin-top: 8px; 
        }
        button { 
            width: 100%; 
            background-color: var(--accent); 
            color: #042f1a; 
            border: none; 
            padding: 15px; 
            font-size: 1rem; 
            font-weight: 700; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-top: 15px; 
            transition: background-color 0.2s;
        }
        button:hover:not(:disabled) { background-color: var(--accent-hover); }
        button:disabled { background-color: var(--border); color: var(--text-muted); cursor: not-allowed; }
        #status { 
            margin-top: 15px; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 0.85rem; 
            text-align: center; 
            background: #0b132b; 
            color: #5bc0be; 
            word-break: break-all; 
            white-space: pre-wrap;
            font-family: monospace;
        }
        .error { background: #451a1a !important; color: #fca5a5 !important; border-color: #7f1d1d !important; }
        .success { background: #064e3b !important; color: #a7f3d0 !important; border-color: #065f46 !important; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>OpenSCAD ➔ STL Converter</h1>
        <p>Rendering 3D locale e offline</p>
    </header>

    <textarea
