<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSCAD4 ➔ STL Converter</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <style>
        :root { --bg-main: #0f172a; --bg-card: #1e293b; --bg-input: #0b0f19; --accent: #10b981; --accent-hover: #059669; --text-main: #f8fafc; --text-muted: #94a3b8; --border: #334155; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background-color: var(--bg-main); color: var(--text-main); padding: 15px; display: flex; flex-direction: column; min-height: 100vh; }
        .container { max-width: 650px; width: 100%; margin: auto; background: var(--bg-card); border-radius: 16px; padding: 24px; border: 1px solid var(--border); }
        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 1.5rem; margin-bottom: 4px; }
        header p { font-size: 0.85rem; color: var(--text-muted); }
        textarea { width: 100%; height: 200px; background-color: var(--bg-input); border: 1px solid var(--border); border-radius: 10px; padding: 14px; color: #38bdf8; font-family: monospace; font-size: 0.95rem; resize: none; outline: none; margin-top: 8px; }
        button { width: 100%; background-color: var(--accent); color: #042f1a; border: none; padding: 15px; font-size: 1rem; font-weight: 700; border-radius: 10px; cursor: pointer; margin-top: 15px; }
        button:disabled { background-color: var(--border); color: var(--text-muted); }
        #status { margin-top: 15px; padding: 12px; border-radius: 8px; font-size: 0.85rem; text-align: center; background: #0b132b; color: #5bc0be; word-break: break-all; white-space: pre-wrap; }
        .error { background: #451a1a !important; color: #fca5a5 !important; border-color: #7f1d1d !important; }
        .success { background: #064e3b !important; color: #a7f3d0 !important; border-color: #065f46 !important; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>OpenSCAD3 ➔ STL Converter</h1>
        <p>Rendering 3D locale e offline</p>
    </header>

    <textarea id="scadCode">// Esempio cilindro forato
difference() {
    cylinder(h=20, r=15, center=true, $fn=50);
    cylinder(h=22, r=8, center=true, $fn=50);
}</textarea>

    <button id="convertBtn" disabled>Inizializzazione...</button>
    <div id="status">Avvio download del motore geometrico...</div>
</div>

<script>
    window.onerror = function(message, source, lineno, colno, error) {
        const status = document.getElementById('status');
        if(status) {
            status.className = "error";
            status.innerText = "BLOCCO SCRIPT: " + message + " (Linea: " + lineno + ")";
        }
        return false;
    };
</script>

<script type="module">
    import * as OScadModule from "https://unpkg.com/openscad-wasm@0.0.4/openscad.js";

    const scadCodeElem = document.getElementById('scadCode');
    const convertBtn = document.getElementById('convertBtn');
    const statusElem = document.getElementById('status');

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log("SW Error:", err));
    }

    let openScadInstance = null;
    let openScadLogs = []; // Array per catturare i messaggi reali di OpenSCAD

    async function init() {
        try {
            let openScadFactory = null;
            const keys = Object.keys(OScadModule);

            if (typeof OScadModule.OpenSCAD === 'function') {
                openScadFactory = OScadModule.OpenSCAD;
            } else if (typeof OScadModule.openscad === 'function') {
                openScadFactory = OScadModule.openscad;
            } else if (typeof OScadModule.default === 'function') {
                openScadFactory = OScadModule.default;
            } else {
                for (let key of keys) {
                    if (typeof OScadModule[key] === 'function') {
                        openScadFactory = OScadModule[key];
                        break;
                    }
                }
            }

            if (!openScadFactory) {
                throw new Error("Nessuna funzione esportata nel file WASM.");
            }

            statusElem.innerText = "Compilazione motore grafico...";

            // Intercettiamo print e printErr di Emscripten per salvare i log reali di OpenSCAD
            openScadInstance = await openScadFactory({ 
                noInitialRun: true,
                print: (text) => {  openScadLogs.push(text); },
                printErr: (text) => { openScadLogs.push(text); },
                locateFile: (path) => `https://unpkg.com/openscad-wasm@0.0.4/${path}`
            });
            
            statusElem.className = "success";
            statusElem.innerText = "Pronto! Inserisci il codice e converti.";
            convertBtn.innerText = "Genera e Scarica STL";
            convertBtn.disabled = false;
        } catch (e) {
            statusElem.className = "error";
            statusElem.innerText = "ERRORE AVVIO: " + e.message;
        }
    }

    convertBtn.addEventListener('click', async () => {
        const code = scadCodeElem.value.trim();
        if(!code) return;
        convertBtn.disabled = true;
        statusElem.className = "";
        statusElem.innerText = "Elaborazione solido 3D in corso...";
        openScadLogs = []; // Svuota i log del vecchio tentativo
        await new Promise(r => setTimeout(r, 50));
        
        try {
            if (!openScadInstance) {
                throw new Error("Il motore grafico non è pronto.");
            }

            // CORREZIONE FONDAMENTALE: Scriviamo il codice in un file virtuale (FS) 
            // per bypassare il crash del passaggio diretto della stringa
            if (openScadInstance.FS && typeof openScadInstance.FS.writeFile === 'function') {
                openScadInstance.FS.writeFile("input.scad", code);
            } else {
                throw new Error("File System virtuale non pronto.");
            }

            let outputData = null;
            
            // Tentiamo prima con renderToStl passando il file finto
            if (typeof openScadInstance.renderToStl === 'function') {
                outputData = await openScadInstance.renderToStl("input.scad");
            } 
            // Se fallisce, usiamo l'interfaccia CLI nativa eseguendo i comandi standard di OpenSCAD
            else if (typeof openScadInstance.callMain === 'function') {
                await openScadInstance.callMain(["-o", "output.stl", "input.scad"]);
                if (openScadInstance.FS && typeof openScadInstance.FS.readFile === 'function') {
                    outputData = openScadInstance.FS.readFile("output.stl");
                }
            } else {
                throw new Error("Nessun metodo di rendering valido trovato nella libreria.");
            }
            
            if (!outputData || outputData.length === 0) {
                throw new Error("Il motore grafico ha restituito un file vuoto.");
            }
            
            const blob = new Blob([outputData], { type: "application/sla" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "modello_3d.stl";
            a.click();
            
            statusElem.className = "success";
            statusElem.innerText = "STL scaricato con successo!";
        } catch (err) {
            statusElem.className = "error";
            let msgErrore = err.message || err.toString();
            if (openScadLogs.length > 0) {
                msgErrore += "\n\nDettagli compilatore:\n" + openScadLogs.slice(-3).join(" | ");
            }
            statusElem.innerText = "ERRORE: " + msgErrore;
        } finally {
            convertBtn.disabled = false;
        }
    });

    init();
</script>

</body>
</html>
